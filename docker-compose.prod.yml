version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    env_file:
      - .env
    expose:
      - "8000"
    volumes:
      - ./app:/app
    command: bash /app/start_app.sh

  celery_worker:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    env_file:
      - .env
    depends_on:
      - web
    volumes:
      - ./app:/app
    command: bash -c "cd /app && PYTHONPATH=/app celery -A app.celery_config:celery_app worker --loglevel=info --concurrency=4"

  caddy:
    build:
      context: .
      dockerfile: docker/caddy.Dockerfile
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
